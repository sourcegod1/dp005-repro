name: DP-004 PoC

on:
  workflow_dispatch:
    inputs:
      strategy:
        description: 'Safety strategy'
        required: true
        default: 'drop-sudo'
        type: choice
        options:
          - drop-sudo
          - unsafe
      sandbox:
        description: 'Sandbox mode'
        required: true
        default: 'workspace-write'
        type: choice
        options:
          - workspace-write
          - none

jobs:
  codex:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          safety-strategy: ${{ inputs.strategy }}
          sandbox: ${{ inputs.sandbox }}
          prompt: |
            Run the following shell commands and print their exact output. Do not modify any files.
            1. id
            2. sudo id
            3. cat /proc/$$/status | grep -i cap
